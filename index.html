<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Super Abel World - 10 Levels | Mario 3D Style</title>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0f1e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Press Start 2P', monospace;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      cursor: pointer;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      pointer-events: none;
      font-family: monospace;
      padding: 8px 16px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      border-bottom: 2px solid #ffcc33;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
      font-weight: bold;
    }
    .ui-stat {
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 20px;
      border-left: 3px solid #ffcc33;
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-size: 14px;
    }
    .ui-stat span:first-child { color: #ffcc33; letter-spacing: 1px; }
    .ui-stat span:last-child { font-size: 18px; font-weight: bold; color: #fff; }
    .menu {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
    }
    .menu.hidden { display: none; }
    .menu-card {
      background: linear-gradient(145deg, #2a2a4a, #0f0f2a);
      border: 3px solid #ffcc33;
      border-radius: 32px;
      padding: 24px 28px;
      text-align: center;
      max-width: 550px;
      width: 85%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .menu-logo {
      font-size: 26px;
      font-weight: bold;
      color: #ffcc33;
      text-shadow: 3px 3px 0 #b45f1b;
      margin-bottom: 8px;
    }
    .menu-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    button {
      background: #e25822;
      border: none;
      font-family: monospace;
      font-weight: bold;
      font-size: 18px;
      padding: 10px 20px;
      border-radius: 60px;
      color: white;
      text-shadow: 1px 1px 0 #6b2e00;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 4px 0 #6b2e00;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #6b2e00; }
    .world-select { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; max-height: 200px; overflow-y: auto; padding: 6px; }
    .world-btn { background: #2c2c5e; font-size: 13px; padding: 6px 12px; box-shadow: none; border: 1px solid #aaa; }
    .world-btn.active { background: #ffaa33; color: #1f1f2f; border-color: gold; box-shadow: 0 0 8px gold; }
    .controls-info { font-size: 10px; color: #ccc; margin-top: 12px; border-top: 1px solid #555; padding-top: 10px; }
    @media (max-width: 600px) {
      .ui-stat { font-size: 9px; padding: 2px 6px; }
      .ui-stat span:last-child { font-size: 12px; }
      .menu-logo { font-size: 18px; }
      button { font-size: 14px; padding: 8px 16px; }
      .world-btn { font-size: 10px; padding: 4px 8px; }
    }
  </style>
</head>
<body>
<div id="ui">
  <div class="ui-stat"><span>⭐ SCORE</span><span id="score">0</span></div>
  <div class="ui-stat"><span>🪙 COINS</span><span id="coins">0</span></div>
  <div class="ui-stat"><span>🌍 WORLD</span><span id="worldName">1-1</span></div>
  <div class="ui-stat"><span>⏱ TIME</span><span id="time">400</span></div>
  <div class="ui-stat"><span>❤️ LIVES</span><span id="lives">3</span></div>
</div>

<canvas id="gameCanvas" width="1280" height="720"></canvas>

<!-- MENUS -->
<div id="startMenu" class="menu">
  <div class="menu-card">
    <div class="menu-logo">🍄 SUPER ABEL WORLD 🍄</div>
    <div style="font-size:12px; color:#ffcc88;">10 EPISCHE LEVELS • 3D MARIO STYLE</div>
    <div class="world-select" id="worldSelect">
      <button data-world="0" class="world-btn active">1-1 VLAKTE</button>
      <button data-world="1" class="world-btn">1-2 WOESTIJN</button>
      <button data-world="2" class="world-btn">2-1 NACHT</button>
      <button data-world="3" class="world-btn">2-2 IJS</button>
      <button data-world="4" class="world-btn">3-1 VULKAAN</button>
      <button data-world="5" class="world-btn">3-2 JUNGLE</button>
      <button data-world="6" class="world-btn">4-1 LUCHT</button>
      <button data-world="7" class="world-btn">4-2 MINING</button>
      <button data-world="8" class="world-btn">5-1 KASTEEL</button>
      <button data-world="9" class="world-btn">⭐ FINAL BOW</button>
    </div>
    <div class="menu-buttons"><button id="startBtn">🚀 START GAME</button></div>
    <div class="controls-info">◀ ▶ bewegen | Z / SPATIE / ↑ springen | X / SHIFT rennen | ESC pauze</div>
  </div>
</div>
<div id="pauseMenu" class="menu hidden"><div class="menu-card"><div class="menu-logo">⏸ PAUZE</div><div class="menu-buttons"><button id="resumeBtn">▶ VERDER</button><button id="quitBtn">🏠 MENU</button></div></div></div>
<div id="gameoverMenu" class="menu hidden"><div class="menu-card"><div class="menu-logo">💀 GAME OVER</div><div id="finalScore" style="margin:10px;font-size:18px;"></div><div class="menu-buttons"><button id="retryBtn">🔄 OPNIEUW</button><button id="menuBtn">🏠 MENU</button></div></div></div>
<div id="winMenu" class="menu hidden"><div class="menu-card"><div class="menu-logo">🏆 LEVEL CLEAR! 🏆</div><div id="winStats" style="margin:10px;font-size:16px;"></div><div class="menu-buttons"><button id="nextBtn">NEXT LEVEL ▶</button><button id="winMenuBtn">MENU</button></div></div></div>

<script>
  (function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let canvasW, canvasH;
    function resizeCanvas() {
      canvasW = window.innerWidth;
      canvasH = window.innerHeight;
      canvas.width = canvasW;
      canvas.height = canvasH;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // CONSTANTEN
    const TILE = 48;
    const GRAVITY = 0.65;
    const MAX_FALL = 16;
    const WALK_SPEED = 3.6;
    const RUN_SPEED = 6.2;
    const JUMP_FORCE = -12.8;
    const RUN_JUMP = -14.5;
    const COYOTE = 8;
    const JUMP_BUFFER = 7;

    let state = 'menu';
    let currentLevelIdx = 0;
    let levelData = null;
    let player = null;
    let camera = { x: 0, y: 0 };
    let score = 0;
    let lives = 3;
    let coins = 0;
    let timeLeft = 400;
    let timeCounter = 0;
    let particles = [];
    let floatingTexts = [];
    let enemies = [];
    let powerState = 0; // 0=small, 1=big
    let invincibleFrames = 0;

    let keys = { left: false, right: false, jump: false, run: false };
    let prevJump = false;
    let jumpBufferTimer = 0;
    let coyoteTimer = 0;

    // 10 LEVELS - elk level heeft unieke layout met veel vijanden
    function buildLevelData(levelNum, W, H) {
      const map = Array(H).fill().map(() => Array(W).fill(0));
      // basis grond
      for(let x=0; x<W; x++) {
        map[H-2][x] = 1;
        map[H-1][x] = 1;
      }
      
      // platforms en obstakels
      for(let i=0; i<W/2; i++) {
        let x = (i * 11 + levelNum * 23) % (W-3);
        let y = H-4 - (i % 4);
        if(y > 2 && x < W-2) {
          map[y][x] = 1;
          if(i%3 === 0 && y-1 > 0) map[y-1][x] = 4; // ? blok
        }
      }
      
      // zwevende munten
      for(let i=0; i<W; i+=2) {
        let x = (i * 7) % (W-2);
        let y = H-6 - (i % 6);
        if(y > 1 && map[y][x] === 0) map[y][x] = 8;
      }
      
      // finish vlag (rechts)
      for(let r=H-5; r<H-1; r++) map[r][W-3] = 9;
      
      // gevaar (lava / spikes) voor variatie
      if(levelNum >= 4) {
        for(let i=0; i<W/3; i++) map[H-1][i*3] = 10;
      }
      
      // vijanden genereren: HONDERDEN!
      const enemyTypes = ['goomba', 'koopa', 'fly', 'goomba', 'koopa', 'fly', 'goomba'];
      let enemyList = [];
      // grond vijanden
      for(let i=0; i<W-2; i+=2) {
        let x = (i * TILE) + 50 + (levelNum * 37);
        let y = (H-2) * TILE - 48;
        let type = enemyTypes[(i + levelNum) % enemyTypes.length];
        enemyList.push({ x: x, y: y, type: type, dir: (i%2===0)?-1:1, alive: true, vy:0, onGround: false, timer: 0, w: 38, h: 42 });
      }
      // lucht vijanden (fly)
      for(let i=0; i<40; i++) {
        let x = (i * 70) % ((W-5)*TILE) + 100;
        let y = (H-8)*TILE - (i%5)*25;
        enemyList.push({ x: x, y: y, type: 'fly', dir: 1, alive: true, vy:0, onGround: false, timer: i*15, w: 38, h: 38 });
      }
      // extra koopas op platformen
      for(let i=0; i<30; i++) {
        let x = (i * 90 + 200) % ((W-4)*TILE);
        let y = (H-5)*TILE - 10;
        enemyList.push({ x: x, y: y, type: 'koopa', dir: (i%2===0)?1:-1, alive: true, vy:0, onGround: true, timer:0, w: 40, h: 44 });
      }
      
      return { map, W, H, enemies: enemyList };
    }

    const LEVEL_THEMES = [
      { name: "1-1 Groene Vlakte", bgTop: "#5c9ce0", bgBot: "#3a7c5a", time: 420, w: 200, h: 20 },
      { name: "1-2 Zand Duinen", bgTop: "#e8b55a", bgBot: "#c28a3e", time: 440, w: 210, h: 20 },
      { name: "2-1 Nacht Kasteel", bgTop: "#12102a", bgBot: "#2a1e4a", time: 460, w: 220, h: 20 },
      { name: "2-2 IJs Grot", bgTop: "#8ecae6", bgBot: "#4699c4", time: 450, w: 230, h: 20 },
      { name: "3-1 Vulkaan Hel", bgTop: "#702020", bgBot: "#3e0a0a", time: 480, w: 240, h: 20 },
      { name: "3-2 Jungle Ruïne", bgTop: "#2f6b2f", bgBot: "#1e451e", time: 470, w: 250, h: 20 },
      { name: "4-1 Luchtpaleis", bgTop: "#7ccfff", bgBot: "#3c9eff", time: 500, w: 260, h: 20 },
      { name: "4-2 Mijnschacht", bgTop: "#5a4a3a", bgBot: "#3a2a1e", time: 520, w: 270, h: 20 },
      { name: "5-1 Donker Kasteel", bgTop: "#3a2a4e", bgBot: "#1a0a2e", time: 550, w: 280, h: 20 },
      { name: "⭐ Finale Bowser", bgTop: "#a13020", bgBot: "#4a1008", time: 600, w: 300, h: 22 }
    ];

    function loadLevel(index) {
      const theme = LEVEL_THEMES[index];
      const W = theme.w;
      const H = theme.h;
      const built = buildLevelData(index, W, H);
      return {
        name: theme.name,
        bgTop: theme.bgTop,
        bgBot: theme.bgBot,
        timeLimit: theme.time,
        W: W,
        H: H,
        map: built.map,
        enemies: built.enemies.map(e => ({ ...e, alive: true })),
        startX: 3 * TILE,
        startY: (H-3) * TILE - 50
      };
    }

    function startLevel(idx) {
      currentLevelIdx = idx;
      levelData = loadLevel(currentLevelIdx);
      timeLeft = levelData.timeLimit;
      timeCounter = 0;
      enemies = levelData.enemies.map(e => ({ ...e, alive: true, vy: 0, onGround: false }));
      powerState = 0;
      invincibleFrames = 0;
      player = {
        x: levelData.startX, y: levelData.startY,
        vx: 0, vy: 0, w: 38, h: 42,
        onGround: false, facing: 1,
        dead: false, deadTimer: 0,
        invincible: 0, running: false,
        walkCycle: 0, walkTimer: 0
      };
      camera.x = 0;
      camera.y = 0;
      particles = [];
      floatingTexts = [];
      state = 'play';
      document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
      updateUI();
    }

    function updateUI() {
      document.getElementById('score').innerText = String(score).padStart(7, '0');
      document.getElementById('coins').innerText = coins;
      document.getElementById('worldName').innerHTML = levelData ? levelData.name.split(' ')[0] : "1-1";
      document.getElementById('time').innerHTML = Math.max(0, Math.ceil(timeLeft));
      document.getElementById('lives').innerHTML = lives;
    }

    function getTile(c, r) {
      if (!levelData) return 0;
      if (r < 0 || r >= levelData.H || c < 0 || c >= levelData.W) return 0;
      return levelData.map[r][c];
    }

    function isSolid(t) { return t === 1 || t === 2 || t === 3 || t === 5 || t === 6 || t === 7; }
    function isLethal(t) { return t === 10; }
    function isCoinTile(t) { return t === 8; }
    function isBlock(t) { return t === 4; }

    function moveEntity(ent, dx, dy, isPlayer) {
      ent.x += dx;
      let left = Math.floor(ent.x / TILE), right = Math.floor((ent.x + ent.w - 1) / TILE);
      let top = Math.floor(ent.y / TILE), bot = Math.floor((ent.y + ent.h - 1) / TILE);
      for (let c = left; c <= right; c++) {
        for (let r = top; r <= bot; r++) {
          let t = getTile(c, r);
          if (isSolid(t)) {
            if (dx > 0) ent.x = c * TILE - ent.w;
            if (dx < 0) ent.x = (c + 1) * TILE;
            if (isPlayer) ent.vx = 0;
          }
        }
      }
      ent.onGround = false;
      ent.y += dy;
      left = Math.floor(ent.x / TILE); right = Math.floor((ent.x + ent.w - 1) / TILE);
      top = Math.floor(ent.y / TILE); bot = Math.floor((ent.y + ent.h - 1) / TILE);
      for (let c = left; c <= right; c++) {
        for (let r = top; r <= bot; r++) {
          let t = getTile(c, r);
          if (isSolid(t)) {
            if (dy > 0) { ent.y = r * TILE - ent.h; ent.vy = 0; ent.onGround = true; }
            if (dy < 0 && isPlayer && isBlock(t)) {
              levelData.map[r][c] = 0;
              coins++; score += 100;
              addFloatingText(c * TILE + TILE / 2, r * TILE, "+100🪙", "#ffcc44");
              spawnParticles(c * TILE + TILE / 2, r * TILE, 6, "#ffaa33");
            }
          }
        }
      }
    }

    function updatePlayer() {
      if (player.dead) {
        player.deadTimer++;
        player.vy += GRAVITY;
        player.y += player.vy;
        if (player.deadTimer > 70) {
          lives--;
          if (lives <= 0) {
            state = 'gameover';
            document.getElementById('finalScore').innerHTML = "Score: " + score + "  Munten: " + coins;
            document.getElementById('gameoverMenu').classList.remove('hidden');
          } else {
            startLevel(currentLevelIdx);
          }
        }
        return;
      }
      if (invincibleFrames > 0) invincibleFrames--;
      
      let speed = (keys.run ? RUN_SPEED : WALK_SPEED);
      if (keys.left) { player.vx = Math.max(player.vx - 0.55, -speed); player.facing = -1; }
      else if (keys.right) { player.vx = Math.min(player.vx + 0.55, speed); player.facing = 1; }
      else { player.vx *= 0.92; }
      player.running = Math.abs(player.vx) > WALK_SPEED;
      
      if (player.onGround) coyoteTimer = COYOTE;
      else if (coyoteTimer > 0) coyoteTimer--;
      
      if (keys.jump && !prevJump) jumpBufferTimer = JUMP_BUFFER;
      if (jumpBufferTimer > 0 && coyoteTimer > 0) {
        player.vy = player.running ? RUN_JUMP : JUMP_FORCE;
        coyoteTimer = 0;
        jumpBufferTimer = 0;
      }
      if (jumpBufferTimer > 0) jumpBufferTimer--;
      if (!keys.jump && player.vy < -5) player.vy += 1.2;
      
      player.vy += GRAVITY;
      if (player.vy > MAX_FALL) player.vy = MAX_FALL;
      moveEntity(player, player.vx, player.vy, true);
      
      // Coins verzamelen
      let mx = Math.floor((player.x + player.w/2) / TILE);
      let my = Math.floor((player.y + player.h/2) / TILE);
      if (isCoinTile(getTile(mx, my))) {
        levelData.map[my][mx] = 0;
        coins++;
        score += 50;
        addFloatingText(mx * TILE, my * TILE, "🪙", "#ffd966");
      }
      
      // Dodelijke tiles
      if (isLethal(getTile(mx, my))) killPlayer();
      
      // Finish vlag
      if (getTile(mx, my) === 9 || getTile(mx+1, my) === 9) winLevel();
      
      if (player.y > levelData.H * TILE + 100) killPlayer();
      
      camera.x = player.x + player.w/2 - canvasW/2;
      camera.x = Math.max(0, Math.min(camera.x, levelData.W * TILE - canvasW));
    }

    function killPlayer() {
      if (player.dead) return;
      if (powerState > 0 && invincibleFrames <= 0) {
        powerState = 0;
        invincibleFrames = 50;
        addFloatingText(player.x, player.y - 20, "OUCH!", "#ff6666");
        return;
      }
      player.dead = true;
      player.vy = -12;
      player.vx = 0;
      spawnParticles(player.x + player.w/2, player.y + player.h/2, 20, "#ff3300");
    }

    function winLevel() {
      let bonus = Math.floor(timeLeft) * 10;
      score += bonus;
      state = 'win';
      document.getElementById('winStats').innerHTML = `SCORE: ${score}<br>MUNTEN: ${coins}<br>TIJDBONUS: +${bonus}`;
      document.getElementById('winMenu').classList.remove('hidden');
    }

    function updateEnemies() {
      for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        if (!e.alive) continue;
        let spd = (e.type === 'fly' ? 1.6 : e.type === 'koopa' ? 1.2 : 1.0);
        if (e.type === 'fly') {
          e.x += e.dir * spd;
          e.timer = (e.timer || 0) + 0.1;
          e.y += Math.sin(e.timer) * 1.5;
          if (e.x < camera.x - 100) e.dir = 1;
          if (e.x > camera.x + canvasW + 100) e.dir = -1;
        } else {
          e.vy += GRAVITY;
          e.x += e.dir * spd;
          moveEntity(e, e.dir * spd, e.vy, false);
          if (!e.onGround && e.vy > 2) {
            let leftTile = Math.floor(e.x / TILE);
            let below = Math.floor((e.y + e.h) / TILE);
            if (!isSolid(getTile(leftTile, below)) && !isSolid(getTile(leftTile + 1, below))) e.dir *= -1;
          }
        }
        // Speler botsing
        if (!player.dead && invincibleFrames <= 0) {
          if (player.x + player.w - 8 > e.x && player.x + 8 < e.x + 38 &&
              player.y + player.h - 8 > e.y && player.y + 12 < e.y + 42) {
            if (player.vy > 0 && player.y + player.h - 12 < e.y + 25) {
              e.alive = false;
              score += (e.type === 'koopa' ? 300 : 150);
              player.vy = -9;
              addFloatingText(e.x, e.y, e.type === 'koopa' ? "+300" : "+150", "#ffff88");
              spawnParticles(e.x + 20, e.y + 20, 8, "#dd8844");
            } else {
              killPlayer();
            }
          }
        }
        if (e.y > levelData.H * TILE + 200) e.alive = false;
      }
    }

    function addFloatingText(x, y, text, col) { floatingTexts.push({ x, y, text, col, life: 45, vy: -1.2 }); }
    function spawnParticles(x, y, count, col) {
      for (let i = 0; i < count; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 1) * 3, life: 30 + Math.random() * 20, color: col, size: 3 + Math.random() * 4 });
      }
    }
    function updateParticles() {
      particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
      floatingTexts = floatingTexts.filter(t => { t.y += t.vy; t.life--; return t.life > 0; });
    }

    function updateTime() {
      if (state !== 'play') return;
      timeCounter++;
      if (timeCounter >= 60) { timeLeft--; timeCounter = 0; if (timeLeft <= 0) killPlayer(); }
      updateUI();
    }

    // TEKENINGEN - 3D Mario style
    function drawPlayer() {
      let px = player.x - camera.x;
      let py = player.y - camera.y;
      if (px + player.w < 0 || px > canvasW) return;
      ctx.save();
      if (invincibleFrames > 0 && (Math.floor(Date.now() / 50) % 4 < 2)) ctx.globalAlpha = 0.5;
      // body
      ctx.fillStyle = "#e04030";
      ctx.fillRect(px + 6, py + player.h * 0.4, player.w - 12, player.h * 0.6);
      ctx.fillStyle = "#2255cc";
      ctx.fillRect(px + 4, py + player.h * 0.5, player.w - 8, player.h * 0.4);
      // head
      ctx.fillStyle = "#f8bc84";
      ctx.beginPath();
      ctx.ellipse(px + player.w/2, py + player.h * 0.28, player.w * 0.35, player.h * 0.28, 0, 0, Math.PI*2);
      ctx.fill();
      // hat
      ctx.fillStyle = "#cc2222";
      ctx.fillRect(px + 4, py - 6, player.w - 8, 12);
      ctx.fillStyle = "#aa1111";
      ctx.fillRect(px + 8, py - 12, player.w - 16, 8);
      // eyes
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(px + player.w*0.35, py + player.h*0.22, 6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + player.w*0.65, py + player.h*0.22, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#111";
      ctx.beginPath(); ctx.arc(px + player.w*0.33 + (player.facing>0?1:-1), py + player.h*0.21, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + player.w*0.63 + (player.facing>0?1:-1), py + player.h*0.21, 3, 0, Math.PI*2); ctx.fill();
      // snor
      ctx.fillStyle = "#784420";
      ctx.fillRect(px + player.w/2 - 12, py + player.h*0.32, 24, 5);
      ctx.restore();
    }

    function drawEnemy(e) {
      let ex = e.x - camera.x;
      let ey = e.y - camera.y;
      if (ex + 40 < 0 || ex > canvasW) return;
      if (e.type === 'goomba') {
        ctx.fillStyle = "#a55a2a";
        ctx.beginPath(); ctx.ellipse(ex + 18, ey + 18, 16, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.fillRect(ex + 10, ey + 12, 5, 5); ctx.fillRect(ex + 22, ey + 12, 5, 5);
      } else if (e.type === 'koopa') {
        ctx.fillStyle = "#2c882c";
        ctx.fillRect(ex + 4, ey + 6, 32, 28);
        ctx.fillStyle = "#ccaa22";
        ctx.beginPath(); ctx.arc(ex + 20, ey + 14, 12, 0, Math.PI*2); ctx.fill();
      } else if (e.type === 'fly') {
        ctx.fillStyle = "#a855f0";
        ctx.beginPath(); ctx.ellipse(ex + 18, ey + 18, 14, 12, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#dd88ff";
        ctx.fillRect(ex + 6, ey + 8, 10, 18);
        ctx.fillRect(ex + 26, ey + 8, 10, 18);
      }
    }

    function drawTiles() {
      let startCol = Math.floor(camera.x / TILE);
      let endCol = Math.min(startCol + Math.ceil(canvasW / TILE) + 2, levelData.W);
      let startRow = Math.floor(camera.y / TILE);
      let endRow = Math.min(startRow + Math.ceil(canvasH / TILE) + 2, levelData.H);
      for (let r = startRow; r < endRow; r++) {
        for (let c = startCol; c < endCol; c++) {
          let t = levelData.map[r][c];
          if (t === 0) continue;
          let x = c * TILE - camera.x;
          let y = r * TILE - camera.y;
          if (t === 1) { ctx.fillStyle = "#8b5a2b"; ctx.fillRect(x, y, TILE, TILE); ctx.fillStyle = "#b87c3c"; ctx.fillRect(x+2, y+2, TILE-4, 8); }
          else if (t === 4) { ctx.fillStyle = "#ffcc44"; ctx.fillRect(x, y, TILE, TILE); ctx.fillStyle = "#fff"; ctx.font = "bold 26px monospace"; ctx.fillText("?", x+TILE/2-8, y+TILE/2+8); }
          else if (t === 8) { ctx.fillStyle = "#ffcc44"; ctx.beginPath(); ctx.ellipse(x+TILE/2, y+TILE/2, 12, 8, 0, 0, Math.PI*2); ctx.fill(); }
          else if (t === 9) { ctx.fillStyle = "#aa5555"; ctx.fillRect(x+TILE/2-4, y, 6, TILE); ctx.fillStyle = "#ff3333"; ctx.fillRect(x+TILE/2+2, y+8, 20, 16); }
          else if (t === 10) { ctx.fillStyle = "#ff4400"; ctx.fillRect(x, y, TILE, TILE); ctx.fillStyle = "#ff8844"; ctx.fillRect(x+4, y+4, TILE-8, TILE-8); }
          else { ctx.fillStyle = "#6a8e4a"; ctx.fillRect(x, y, TILE, TILE); }
        }
      }
    }

    function drawBackground() {
      let grad = ctx.createLinearGradient(0, 0, 0, canvasH);
      grad.addColorStop(0, levelData.bgTop);
      grad.addColorStop(1, levelData.bgBot);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvasW, canvasH);
    }

    function draw() {
      if (!levelData) return;
      drawBackground();
      drawTiles();
      for (let e of enemies) if (e.alive) drawEnemy(e);
      if (player && !player.dead) drawPlayer();
      for (let p of particles) { ctx.globalAlpha = Math.min(1, p.life / 30); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x - camera.x, p.y - camera.y, p.size, 0, Math.PI*2); ctx.fill(); }
      for (let t of floatingTexts) { ctx.globalAlpha = t.life / 45; ctx.fillStyle = t.col; ctx.font = "bold 18px monospace"; ctx.fillText(t.text, t.x - camera.x, t.y - camera.y); }
      ctx.globalAlpha = 1;
    }

    // INPUT
    function handleInput() {
      prevJump = keys.jump;
      keys.left = (window.keysPressed?.ArrowLeft || window.keysPressed?.KeyA) || false;
      keys.right = (window.keysPressed?.ArrowRight || window.keysPressed?.KeyD) || false;
      keys.jump = (window.keysPressed?.Space || window.keysPressed?.KeyZ || window.keysPressed?.ArrowUp || window.keysPressed?.KeyW) || false;
      keys.run = (window.keysPressed?.ShiftLeft || window.keysPressed?.ShiftRight || window.keysPressed?.KeyX) || false;
    }
    window.keysPressed = {};
    document.addEventListener('keydown', (e) => { let k = e.code; window.keysPressed[k] = true; if (k === 'Escape' && state === 'play') { state = 'pause'; document.getElementById('pauseMenu').classList.remove('hidden'); } });
    document.addEventListener('keyup', (e) => { window.keysPressed[e.code] = false; });

    function gameLoop() {
      if (state === 'play') {
        handleInput();
        updateTime();
        updatePlayer();
        updateEnemies();
        updateParticles();
        updateUI();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Menu handlers
    document.getElementById('startBtn').onclick = () => {
      let active = document.querySelector('.world-btn.active');
      let idx = active ? parseInt(active.dataset.world) : 0;
      lives = 3; score = 0; coins = 0;
      startLevel(idx);
    };
    document.querySelectorAll('.world-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.world-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
    });
    document.getElementById('resumeBtn').onclick = () => { state = 'play'; document.getElementById('pauseMenu').classList.add('hidden'); };
    document.getElementById('quitBtn').onclick = () => { state = 'menu'; document.getElementById('pauseMenu').classList.add('hidden'); document.getElementById('startMenu').classList.remove('hidden'); };
    document.getElementById('retryBtn').onclick = () => { startLevel(currentLevelIdx); };
    document.getElementById('menuBtn').onclick = () => { state = 'menu'; document.getElementById('gameoverMenu').classList.add('hidden'); document.getElementById('startMenu').classList.remove('hidden'); };
    document.getElementById('nextBtn').onclick = () => {
      if (currentLevelIdx + 1 < LEVEL_THEMES.length) startLevel(currentLevelIdx + 1);
      else { state = 'menu'; document.getElementById('winMenu').classList.add('hidden'); document.getElementById('startMenu').classList.remove('hidden'); }
    };
    document.getElementById('winMenuBtn').onclick = () => { state = 'menu'; document.getElementById('winMenu').classList.add('hidden'); document.getElementById('startMenu').classList.remove('hidden'); };
    
    levelData = loadLevel(0);
    gameLoop();
  })();
</script>
</body>
</html>
