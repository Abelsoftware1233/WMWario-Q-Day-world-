<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Super Abel World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#0a0a1a;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;position:fixed;width:100%;height:100%;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}

#hud{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.85);border-bottom:3px solid #ffcc33;
  padding:6px 10px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;z-index:20;
  font-weight:bold;color:white;backdrop-filter:blur(4px);}
.hud-item{background:rgba(0,0,0,0.6);padding:3px 10px;border-radius:20px;border-left:3px solid #ffcc33;text-align:center;}
.hud-label{font-size:8px;color:#ffcc33;letter-spacing:1px;}
.hud-value{font-size:14px;font-weight:bold;}

/* MOBILE CONTROLS */
#mobileControls{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;
  align-items:flex-end;padding:0 12px 20px;z-index:30;pointer-events:none;}
.ctrl-group{display:flex;gap:10px;pointer-events:auto;}

.ctrl-btn{
  width:70px;height:70px;border-radius:50%;
  background:rgba(0,0,0,0.8);
  border:3px solid #ffcc33;
  color:#ffcc33;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;
  box-shadow:0 4px 0 rgba(0,0,0,0.5), 0 0 15px rgba(255,204,51,0.2);
  -webkit-user-select:none;user-select:none;
  transition:transform 0.06s, background 0.06s;
  position:relative;
}
.ctrl-btn:active,.ctrl-btn.pressed{
  transform:scale(0.9) translateY(2px);
  background:rgba(255,180,0,0.35);
  box-shadow:0 2px 0 rgba(0,0,0,0.5);
}
#jumpBtn{background:rgba(180,40,20,0.85);border-color:#ff7755;color:white;font-size:22px;width:75px;height:75px;}
#jumpBtn.pressed{background:rgba(255,80,40,0.9);}
#runBtn{background:rgba(30,80,200,0.85);border-color:#6699ff;color:white;font-size:18px;}
#runBtn.pressed{background:rgba(60,130,255,0.9);}

@media(max-width:480px){
  .ctrl-btn{width:60px;height:60px;font-size:22px;}
  #jumpBtn{width:65px;height:65px;}
}
@media(max-width:360px){
  .ctrl-btn{width:52px;height:52px;font-size:19px;}
  #jumpBtn{width:58px;height:58px;}
}

/* MENUS */
.menu{position:fixed;inset:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);
  z-index:100;display:flex;align-items:center;justify-content:center;}
.menu.hidden{display:none;}
.menu-card{background:linear-gradient(145deg,#1a1a3e,#0a0a1a);border:3px solid #ffcc33;
  border-radius:24px;padding:22px 20px;text-align:center;width:92%;max-width:480px;
  max-height:85vh;overflow-y:auto;}
.menu-logo{font-size:20px;color:#ffcc33;text-shadow:2px 2px 0 #b45f1b;margin-bottom:6px;line-height:1.4;}
.sub-title{font-size:10px;color:#ffcc88;margin-bottom:12px;}
.world-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;padding:4px;}
.world-btn{background:#1e1e4a;border:2px solid #4a4a8a;color:#ccc;font-family:monospace;
  font-size:11px;padding:7px 12px;border-radius:20px;cursor:pointer;transition:0.15s;}
.world-btn:hover,.world-btn.active{background:#ffaa33;color:#1a1a2a;border-color:gold;font-weight:bold;}
.menu-btn{background:#c04010;border:none;font-family:monospace;font-size:15px;font-weight:bold;
  padding:10px 24px;border-radius:30px;color:white;cursor:pointer;margin:6px 4px;
  box-shadow:0 4px 0 #6b1500;touch-action:manipulation;}
.menu-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #6b1500;}
.menu-btn.green{background:#1a7a1a;box-shadow:0 4px 0 #0a3a0a;}
.ctrl-info{font-size:9px;color:#888;margin-top:10px;padding-top:8px;border-top:1px solid #333;line-height:1.6;}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-item"><div class="hud-label">⭐ SCORE</div><div class="hud-value" id="scoreVal">0</div></div>
  <div class="hud-item"><div class="hud-label">🪙 MUNTEN</div><div class="hud-value" id="coinVal">0</div></div>
  <div class="hud-item"><div class="hud-label">🌍 LEVEL</div><div class="hud-value" id="worldVal">1-1</div></div>
  <div class="hud-item"><div class="hud-label">⏱ TIJD</div><div class="hud-value" id="timeVal">400</div></div>
  <div class="hud-item"><div class="hud-label">❤️ LEVENS</div><div class="hud-value" id="livesVal">3</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="mobileControls">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="leftBtn">◀</div>
    <div class="ctrl-btn" id="rightBtn">▶</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn" id="runBtn">RUN</div>
    <div class="ctrl-btn" id="jumpBtn">JUMP</div>
  </div>
</div>

<!-- MENUS -->
<div id="startMenu" class="menu">
  <div class="menu-card">
    <div class="menu-logo">🍄 SUPER ABEL123 WORLD 🍄</div>
    <div class="sub-title">10 EPISCHE LEVELS • MARIO STYLE</div>
    <div class="world-grid" id="worldGrid"></div>
    <button class="menu-btn" id="startGameBtn">🚀 START GAME</button>
    <div class="ctrl-info">
      ◀ ▶ = lopen &nbsp;|&nbsp; JUMP / Z / ↑ / Spatie = springen<br>
      RUN / X / Shift = rennen &nbsp;|&nbsp; ESC = pauze
    </div>
  </div>
</div>

<div id="pauseMenu" class="menu hidden">
  <div class="menu-card">
    <div class="menu-logo">⏸ PAUZE</div>
    <button class="menu-btn green" id="resumeBtn">▶ VERDER</button>
    <button class="menu-btn" id="quitToMenuBtn">🏠 MENU</button>
  </div>
</div>

<div id="gameoverMenu" class="menu hidden">
  <div class="menu-card">
    <div class="menu-logo">💀 GAME OVER</div>
    <div id="goScore" style="color:#ffcc88;margin:10px 0;font-size:13px;"></div>
    <button class="menu-btn green" id="retryBtn">🔄 OPNIEUW</button>
    <button class="menu-btn" id="goMenuBtn">🏠 MENU</button>
  </div>
</div>

<div id="winMenu" class="menu hidden">
  <div class="menu-card">
    <div class="menu-logo">🏆 LEVEL CLEAR!</div>
    <div id="winInfo" style="color:#ffcc88;margin:10px 0;font-size:13px;"></div>
    <button class="menu-btn green" id="nextLevelBtn">VOLGENDE ▶</button>
    <button class="menu-btn" id="winMenuBtn">🏠 MENU</button>
  </div>
</div>

<script>
(function(){
'use strict';

// ─── CONSTANTS (eerst declareren!) ─────────────────────────────────────────
const HUD_H        = 80;
const BTN_H        = 110;
const MAP_ROWS_VIS = 14;
function calcTile(){ return Math.floor((window.innerHeight - HUD_H - BTN_H) / MAP_ROWS_VIS); }
let TILE = Math.max(28, Math.min(42, calcTile()));

const GRAVITY      = 0.55;
const MAX_FALL     = 15;
const WALK_SPEED   = 3.2;
const RUN_SPEED    = 5.6;
const JUMP_POWER   = -13;
const RUN_JUMP     = -14.5;
const COYOTE_MAX   = 7;
const JUMP_BUF_MAX = 8;

// ─── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let cw, ch;
function resize(){
  cw = canvas.width  = window.innerWidth;
  ch = canvas.height = window.innerHeight;
  TILE = Math.max(28, Math.min(42, calcTile()));
}
window.addEventListener('resize', resize);
resize();
let gameState    = 'menu';
let currentLevel = 0;
let selectedLevel= 0;
let level        = null;
let player       = null;
let cameraX      = 0;
let score        = 0;
let coins        = 0;
let lives        = 3;
let timeLeft     = 400;
let timeTick     = 0;
let enemies      = [];
let particles    = [];
let floatTexts   = [];
let invincible   = 0;
let powerup      = 0;
let starPower    = 0;

// jump state
let coyote   = 0;
let jumpBuf  = 0;
let prevJump = false;

// ─── INPUT ─────────────────────────────────────────────────────────────────
const keys = {};
const input = { left:false, right:false, jump:false, run:false };

// Keyboard
document.addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(e.code==='Escape' && gameState==='play') togglePause();
  e.preventDefault();
},{passive:false});
document.addEventListener('keyup', e=>{ keys[e.code]=false; },{passive:false});

function readKeys(){
  input.left  = !!(keys['ArrowLeft']  || keys['KeyA']);
  input.right = !!(keys['ArrowRight'] || keys['KeyD']);
  input.jump  = !!(keys['ArrowUp'] || keys['KeyW'] || keys['KeyZ'] || keys['Space']);
  input.run   = !!(keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyX']);
}

// ─── TOUCH / MOBILE BUTTONS ────────────────────────────────────────────────
// Each button tracks whether it is currently held.
const touchInput = { left:false, right:false, jump:false, run:false };

function setupBtn(id, prop){
  const el = document.getElementById(id);
  function on(e){ e.preventDefault(); touchInput[prop]=true; el.classList.add('pressed'); }
  function off(e){ e.preventDefault(); touchInput[prop]=false; el.classList.remove('pressed'); }
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend',   off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  // mouse fallback for desktop testing
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
  el.addEventListener('mouseleave',off);
}

setupBtn('leftBtn',  'left');
setupBtn('rightBtn', 'right');
setupBtn('jumpBtn',  'jump');
setupBtn('runBtn',   'run');

function mergeInput(){
  readKeys();
  input.left  = input.left  || touchInput.left;
  input.right = input.right || touchInput.right;
  input.jump  = input.jump  || touchInput.jump;
  input.run   = input.run   || touchInput.run;
}

// ─── LEVEL THEMES ──────────────────────────────────────────────────────────
const themes = [
  {name:"1-1 VLAKTE",   sky:"#5c9ce0", ground:"#3a7c5a", time:400, W:200, lava:false},
  {name:"1-2 WOESTIJN", sky:"#e8b55a", ground:"#c28a3e", time:420, W:210, lava:false},
  {name:"2-1 NACHT",    sky:"#12102a", ground:"#2a1e4a", time:440, W:220, lava:false},
  {name:"2-2 IJS",      sky:"#8ecae6", ground:"#4699c4", time:430, W:230, lava:false},
  {name:"3-1 VULKAAN",  sky:"#702020", ground:"#3e0a0a", time:460, W:240, lava:true },
  {name:"3-2 JUNGLE",   sky:"#2f6b2f", ground:"#1e451e", time:450, W:250, lava:false},
  {name:"4-1 LUCHT",    sky:"#7ccfff", ground:"#3c9eff", time:480, W:260, lava:false},
  {name:"4-2 MINING",   sky:"#5a4a3a", ground:"#3a2a1e", time:500, W:270, lava:false},
  {name:"5-1 KASTEEL",  sky:"#3a2a4e", ground:"#1a0a2e", time:530, W:280, lava:false},
  {name:"⭐ FINAL",     sky:"#a13020", ground:"#4a1008", time:600, W:300, lava:true },
];

// ─── LEVEL BUILDER ─────────────────────────────────────────────────────────

// tile IDs
const T_EMPTY  = 0;
const T_BLOCK  = 1;
const T_QUEST  = 4;
const T_POWER  = 5;
const T_COIN   = 8;
const T_FLAG   = 9;
const T_LAVA   = 10;

function buildLevel(idx){
  const th = themes[idx];
  const W  = th.W;
  const H  = MAP_ROWS_VIS;
  const map= Array.from({length:H}, ()=>new Array(W).fill(T_EMPTY));

  // solid ground (bottom 2 rows)
  for(let x=0;x<W;x++){
    map[H-1][x] = T_BLOCK;
    map[H-2][x] = T_BLOCK;
  }

  // platforms — max hoogte rij 3 zodat er genoeg lucht is om te springen
  const rng = seeded(idx * 1337 + 42);
  let gapEnd = 10;
  for(let i=0; i<Math.floor(W/6); i++){
    let px = gapEnd + Math.floor(rng() * 5) + 3;
    let py = H - 4 - Math.floor(rng() * 4); // max 4 rijen boven grond
    let pw = 2 + Math.floor(rng() * 3);
    if(px+pw >= W-4) break;
    if(py < 3) py = 3;
    for(let j=0;j<pw;j++){
      if(map[py][px+j] === T_EMPTY) map[py][px+j] = T_BLOCK;
    }
    if(rng() > 0.5 && py-1 > 1){
      map[py-1][px + Math.floor(pw/2)] = rng()>0.5 ? T_QUEST : T_COIN;
    }
    if(rng() > 0.7 && map[py][px + Math.floor(pw/2)] === T_BLOCK){
      // power block op grond naast platform
    }
    gapEnd = px + pw;
  }

  // munten in de lucht (rij 4-8)
  for(let x=5; x<W-4; x+=3){
    let y = H - 5 - Math.floor(rng()*4);
    if(y > 2 && y < H-3 && map[y][x]===T_EMPTY && map[y+1][x]===T_EMPTY) map[y][x]=T_COIN;
  }

  // vraag-blokken op rij H-4
  for(let x=8; x<W-4; x+=7){
    if(map[H-4][x]===T_EMPTY) map[H-4][x] = rng()>0.5 ? T_QUEST : T_POWER;
  }

  // lava op bottom row
  if(th.lava){
    for(let x=0;x<W;x++) map[H-1][x] = T_LAVA;
  }

  // finish vlag
  for(let r=H-6; r<H-2; r++) map[r][W-4] = T_FLAG;

  // vijanden
  const enemyList = [];
  const types = ['goomba','koopa','fly'];
  for(let x=12; x<W-5; x+=5){
    let type = types[Math.floor(rng()*types.length)];
    // fly zweeft hoger, anderen op grond
    let ey = type==='fly' ? (H-5)*TILE : (H-3)*TILE - 42;
    // maar y wordt hierna bij loadLevel goed gezet op basis van TILE
    enemyList.push({
      x: x*TILE, baseRow: type==='fly' ? H-5 : H-3,
      vx:0, vy:0, type,
      dir: rng()>0.5 ? 1 : -1,
      alive:true, onGround:false,
      floatTimer:0,
      w:Math.round(TILE*0.8), h:Math.round(TILE*0.85)
    });
  }

  return {map, W, H, enemies:enemyList, th};
}

// simple seeded PRNG
function seeded(seed){
  let s = seed>>>0;
  return function(){
    s = (s^61)^(s>>>16);
    s = (s + (s<<3))>>>0;
    s ^= (s>>>4);
    s = Math.imul(s, 0x27d4eb2d)>>>0;
    s ^= (s>>>15);
    return (s>>>0)/4294967296;
  };
}

// ─── LOAD / START ──────────────────────────────────────────────────────────
function loadLevel(idx){
  const built = buildLevel(idx);
  level = {
    map: built.map,
    W: built.W, H: built.H,
    name: built.th.name,
    sky: built.th.sky,
    ground: built.th.ground,
    timeLimit: built.th.time,
  };
  // vijanden: y positie berekend op actuele TILE
  enemies = built.enemies.map(e=>({
    ...e,
    y: e.baseRow * TILE - e.h,
    w: Math.round(TILE*0.8),
    h: Math.round(TILE*0.85),
  }));
  timeLeft  = level.timeLimit;
  timeTick  = 0;
  invincible= 0;
  powerup   = 0;
  starPower = 0;
  particles = [];
  floatTexts= [];
  coyote    = 0;
  jumpBuf   = 0;
  prevJump  = false;

  // speler: spawn op grond rij H-3, linksboven in beeld
  const PW = Math.round(TILE * 0.75);
  const PH = Math.round(TILE * 0.9);
  player = {
    x: 3 * TILE,
    y: (level.H - 3) * TILE - PH,
    vx:0, vy:0,
    w: PW, h: PH,
    onGround:false,
    facing:1,
    dead:false, deadTimer:0,
  };
  cameraX = 0;
}

function startGame(idx){
  currentLevel = idx;
  score = 0; coins = 0; lives = 3;
  loadLevel(idx);
  gameState = 'play';
  hideAllMenus();
  updateHUD();
}

function nextLevel(){
  currentLevel++;
  if(currentLevel >= themes.length) currentLevel = 0;
  loadLevel(currentLevel);
  gameState = 'play';
  hideAllMenus();
  updateHUD();
}

function restartLevel(){
  loadLevel(currentLevel);
  gameState = 'play';
  hideAllMenus();
}

// ─── MENUS ─────────────────────────────────────────────────────────────────
function hideAllMenus(){
  document.querySelectorAll('.menu').forEach(m=>m.classList.add('hidden'));
}
function showMenu(id){
  hideAllMenus();
  document.getElementById(id).classList.remove('hidden');
}

function togglePause(){
  if(gameState==='play'){ gameState='pause'; showMenu('pauseMenu'); }
  else if(gameState==='pause'){ gameState='play'; hideAllMenus(); }
}

// build world selection grid
(function buildGrid(){
  const grid = document.getElementById('worldGrid');
  themes.forEach((t,i)=>{
    const btn = document.createElement('button');
    btn.className = 'world-btn' + (i===0?' active':'');
    btn.textContent = t.name;
    btn.dataset.world = i;
    btn.addEventListener('click', ()=>{
      selectedLevel = i;
      grid.querySelectorAll('.world-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
    grid.appendChild(btn);
  });
})();

document.getElementById('startGameBtn').addEventListener('click', ()=>startGame(selectedLevel));
document.getElementById('resumeBtn').addEventListener('click', ()=>{ gameState='play'; hideAllMenus(); });
document.getElementById('quitToMenuBtn').addEventListener('click', ()=>showMenu('startMenu'));
document.getElementById('retryBtn').addEventListener('click', ()=>{ lives=3; restartLevel(); });
document.getElementById('goMenuBtn').addEventListener('click', ()=>showMenu('startMenu'));
document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
document.getElementById('winMenuBtn').addEventListener('click', ()=>showMenu('startMenu'));

// ─── TILE HELPERS ──────────────────────────────────────────────────────────
function getTile(c,r){
  if(!level||r<0||r>=level.H||c<0||c>=level.W) return 0;
  return level.map[r][c];
}
function setTile(c,r,v){ if(level&&r>=0&&r<level.H&&c>=0&&c<level.W) level.map[r][c]=v; }
const isSolid = t=> t===T_BLOCK || t===T_POWER;
const isLetal = t=> t===T_LAVA;
const isCoin  = t=> t===T_COIN;
const isQuest = t=> t===T_QUEST;
const isPower = t=> t===T_POWER;
const isFlag  = t=> t===T_FLAG;

// ─── COLLISION / MOVEMENT ──────────────────────────────────────────────────
// Returns {x,y,vx,vy,onGround} after moving entity by (dx,dy).
// Separates X and Y so we never get stuck in corners.
function moveRect(e, dx, dy, onHitHead){
  // X sweep
  e.x += dx;
  let left  = Math.floor(e.x / TILE);
  let right = Math.floor((e.x + e.w - 1) / TILE);
  let top   = Math.floor(e.y / TILE);
  let bot   = Math.floor((e.y + e.h - 1) / TILE);

  for(let cy=top; cy<=bot; cy++){
    for(let cx=left; cx<=right; cx++){
      if(isSolid(getTile(cx,cy))){
        if(dx > 0){ e.x = cx*TILE - e.w;  e.vx = 0; }
        if(dx < 0){ e.x = (cx+1)*TILE;    e.vx = 0; }
        left  = Math.floor(e.x / TILE);
        right = Math.floor((e.x + e.w - 1) / TILE);
        break;
      }
    }
  }

  // Y sweep
  e.onGround = false;
  e.y += dy;
  top = Math.floor(e.y / TILE);
  bot = Math.floor((e.y + e.h - 1) / TILE);
  left  = Math.floor(e.x / TILE);
  right = Math.floor((e.x + e.w - 1) / TILE);

  for(let cy=top; cy<=bot; cy++){
    for(let cx=left; cx<=right; cx++){
      let t = getTile(cx,cy);
      if(isSolid(t)){
        if(dy > 0){ // landing
          e.y = cy*TILE - e.h;
          e.vy = 0;
          e.onGround = true;
        }
        if(dy < 0){ // hit ceiling
          e.y = (cy+1)*TILE;
          e.vy = 0;
          if(onHitHead) onHitHead(cx, cy, t);
        }
        top = Math.floor(e.y / TILE);
        bot = Math.floor((e.y + e.h - 1) / TILE);
        break;
      }
    }
  }
}

// ─── PLAYER UPDATE ─────────────────────────────────────────────────────────
function updatePlayer(){
  if(player.dead){
    player.deadTimer++;
    player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);
    player.y += player.vy;
    if(player.deadTimer > 90){
      lives--;
      if(lives <= 0){
        gameState = 'gameover';
        document.getElementById('goScore').innerHTML =
          `Score: <b>${score}</b><br>Munten: <b>${coins}</b>`;
        showMenu('gameoverMenu');
      } else {
        restartLevel();
      }
    }
    return;
  }

  if(invincible > 0) invincible--;
  if(starPower  > 0) starPower--;

  // ── horizontal ──
  const spd = input.run ? RUN_SPEED : WALK_SPEED;
  const accel = 0.55, decel = 0.88;

  if(input.left){
    player.vx = Math.max(player.vx - accel, -spd);
    player.facing = -1;
  } else if(input.right){
    player.vx = Math.min(player.vx + accel,  spd);
    player.facing = 1;
  } else {
    player.vx *= decel;
    if(Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // ── coyote time ──
  if(player.onGround) coyote = COYOTE_MAX;
  else if(coyote > 0) coyote--;

  // ── jump buffer ──
  const jumpPressed = input.jump;
  if(jumpPressed && !prevJump) jumpBuf = JUMP_BUF_MAX;
  if(jumpBuf > 0) jumpBuf--;

  // ── execute jump ──
  if(jumpBuf > 0 && coyote > 0){
    player.vy = input.run ? RUN_JUMP : JUMP_POWER;
    coyote  = 0;
    jumpBuf = 0;
    addParts(player.x + player.w/2, player.y + player.h, 4, '#ffffaa');
  }

  // ── variable height: release early = lower jump ──
  if(!jumpPressed && player.vy < -3) player.vy += 2.0;

  prevJump = jumpPressed;

  // ── gravity ──
  player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);

  // ── move with collision ──
  moveRect(player, player.vx, player.vy, (cx,cy,t)=>{
    // hit a block from below
    if(isQuest(t)){
      setTile(cx,cy,T_BLOCK);
      coins++; score += 100;
      addFloat(cx*TILE+TILE/2, cy*TILE, '+100', '#ffcc44');
      spawnCoin(cx*TILE+TILE/2, cy*TILE-10);
    } else if(isPower(t)){
      setTile(cx,cy,T_BLOCK);
      powerup = Math.min(2, powerup+1);
      score += 500;
      addFloat(cx*TILE+TILE/2, cy*TILE, 'POWER UP!', '#ff55ff');
      addParts(cx*TILE+TILE/2, cy*TILE, 12, '#ff88ff');
    }
  });

  // ── coin / hazard / flag tiles at player center ──
  const pcx = Math.floor((player.x + player.w/2) / TILE);
  const pcy = Math.floor((player.y + player.h/2) / TILE);
  const pcyH= Math.floor((player.y + player.h - 4) / TILE);

  // coins
  [[pcx,pcy],[pcx,pcyH]].forEach(([cx,cy])=>{
    if(isCoin(getTile(cx,cy))){
      setTile(cx,cy,T_EMPTY);
      coins++; score += 50;
      addFloat(cx*TILE+TILE/2, cy*TILE, '🪙', '#ffd966');
      addParts(cx*TILE+TILE/2, cy*TILE+TILE/2, 5, '#ffcc44');
    }
  });

  // lava / pit death — game-space Y (geen HUD_H)
  if(isLetal(getTile(pcx, pcyH)) || player.y > level.H * TILE + 200) killPlayer();

  // flag (win)
  if(isFlag(getTile(pcx,pcy)) || isFlag(getTile(pcx,pcyH))) winLevel();

  // ── camera ──
  const targetX = player.x + player.w/2 - cw/2;
  cameraX = Math.max(0, Math.min(targetX, level.W*TILE - cw));
}

// ─── ENEMIES ───────────────────────────────────────────────────────────────
function updateEnemies(){
  enemies.forEach(e=>{
    if(!e.alive) return;
    // only update if near camera
    if(e.x < cameraX - 300 || e.x > cameraX + cw + 300) return;

    if(e.type==='fly'){
      e.floatTimer += 0.07;
      e.x += e.dir * 1.8;
      e.y += Math.sin(e.floatTimer) * 1.5;
      if(e.x < cameraX - 100) e.dir = 1;
      if(e.x > cameraX + cw + 100) e.dir = -1;
    } else {
      e.vy = Math.min(e.vy + GRAVITY, MAX_FALL);
      const spd = e.type==='koopa' ? 1.4 : 1.0;

      // move X
      e.x += e.dir * spd;
      // wall check
      const er = Math.floor((e.x + (e.dir>0 ? e.w : 0)) / TILE);
      const eyt= Math.floor(e.y / TILE);
      const eyb= Math.floor((e.y + e.h - 1) / TILE);
      for(let cy=eyt; cy<=eyb; cy++){
        if(isSolid(getTile(er,cy))){ e.dir *= -1; e.x += e.dir*spd*2; break; }
      }

      // move Y
      moveRect(e, 0, e.vy, null);

      // turn at ledge edge
      if(e.onGround){
        const ahead = Math.floor((e.x + (e.dir>0 ? e.w+2 : -2)) / TILE);
        const below = Math.floor((e.y + e.h + 2) / TILE);
        if(!isSolid(getTile(ahead, below))) e.dir *= -1;
      }
    }

    // ── player collision ──
    if(!player.dead){
      const px1=player.x+6, px2=player.x+player.w-6;
      const py1=player.y+4, py2=player.y+player.h-4;
      const ex1=e.x,        ex2=e.x+e.w;
      const ey1=e.y,        ey2=e.y+e.h;

      if(px2>ex1 && px1<ex2 && py2>ey1 && py1<ey2){
        // stomp (player falling and above centre of enemy)
        const stompThresh = e.y + e.h * 0.45;
        if(player.vy > 0 && player.y + player.h - 10 <= stompThresh + 12){
          killEnemy(e);
        } else if(starPower > 0){
          killEnemy(e);
        } else {
          hurtPlayer();
        }
      }
    }

    if(e.y > level.H*TILE + 200) e.alive = false;
  });
}

function killEnemy(e){
  e.alive = false;
  const pts = e.type==='koopa' ? 300 : 150;
  score += pts;
  player.vy = -9; // bounce
  addFloat(e.x+e.w/2, e.y, `+${pts}`, '#ffff88');
  addParts(e.x+e.w/2, e.y+e.h/2, 8, '#dd8844');
}

// ─── KILL / HURT ───────────────────────────────────────────────────────────
function hurtPlayer(){
  if(invincible>0 || starPower>0) return;
  if(powerup>0){
    powerup--;
    invincible = 90;
    addFloat(player.x+player.w/2, player.y-10, 'OUCH!', '#ff8888');
    addParts(player.x+player.w/2, player.y+player.h/2, 12, '#ffaa66');
  } else {
    killPlayer();
  }
}

function killPlayer(){
  if(player.dead) return;
  player.dead = true;
  player.vy   = -11;
  player.vx   = 0;
  addParts(player.x+player.w/2, player.y+player.h/2, 20, '#ff4400');
}

// ─── WIN ───────────────────────────────────────────────────────────────────
function winLevel(){
  if(gameState !== 'play') return;
  gameState = 'win';
  const bonus = Math.floor(timeLeft) * 10;
  score += bonus;
  const last = currentLevel >= themes.length - 1;
  document.getElementById('winInfo').innerHTML =
    `Score: <b>${score}</b><br>Munten: <b>${coins}</b><br>Tijd bonus: <b>+${bonus}</b>`;
  document.getElementById('nextLevelBtn').textContent =
    last ? '🏆 FINISH' : 'VOLGENDE ▶';
  showMenu('winMenu');
}

// ─── HUD ───────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('coinVal').textContent  = coins;
  document.getElementById('worldVal').textContent = level ? level.name.split(' ').slice(0,2).join(' ') : '1-1';
  document.getElementById('timeVal').textContent  = Math.max(0, Math.ceil(timeLeft));
  document.getElementById('livesVal').textContent = lives;
}

function updateTime(){
  timeTick++;
  if(timeTick >= 60){ timeLeft = Math.max(0, timeLeft-1); timeTick=0; }
  if(timeLeft <= 0) killPlayer();
}

// ─── PARTICLES / FLOATS ────────────────────────────────────────────────────
function addFloat(x,y,txt,col){ floatTexts.push({x,y,txt,col,life:50,vy:-1.1}); }
function addParts(x,y,n,col){
  for(let i=0;i<n;i++) particles.push({
    x, y,
    vx:(Math.random()-0.5)*6,
    vy:(Math.random()-1.5)*4,
    life:18+Math.random()*18,
    col,
    size:2+Math.random()*4
  });
}
function spawnCoin(x,y){
  // animated coin pop (just a particle burst)
  addParts(x,y,6,'#ffcc44');
}

function updateEffects(){
  particles  = particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--; return p.life>0; });
  floatTexts = floatTexts.filter(t=>{ t.y+=t.vy; t.life--; return t.life>0; });
}

// ─── DRAWING ───────────────────────────────────────────────────────────────
function drawBg(){
  const g = ctx.createLinearGradient(0, HUD_H, 0, ch - BTN_H);
  g.addColorStop(0, level.sky);
  g.addColorStop(1, level.ground);
  ctx.fillStyle = g;
  ctx.fillRect(0, HUD_H, cw, ch - HUD_H);
  // parallax wolken
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  for(let i=0;i<5;i++){
    const cx2 = ((i*240 - cameraX*0.25 + 9999) % (cw+300)) - 50;
    const cy2 = HUD_H + 30 + i*28;
    ctx.beginPath();
    ctx.ellipse(cx2, cy2, 65+i*12, 26, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

const TILE_COLORS = {
  [T_BLOCK]: ['#7a4a20','#9a6030','#5a3010'],
  [T_QUEST]: ['#ffaa00','#ffcc00','#cc8800'],
  [T_POWER]: ['#cc44cc','#ee66ee','#993399'],
  [T_COIN]:  ['#ffdd00','#ffee44','#ccaa00'],
  [T_FLAG]:  ['#cccc44','#eeee66','#aaaa22'],
  [T_LAVA]:  ['#ff3300','#ff6600','#cc2200'],
};
const TILE_TEXT = {
  [T_QUEST]: '?',
  [T_COIN]:  '🪙',
  [T_FLAG]:  '🏁',
  [T_LAVA]:  '🔥',
};

function drawTiles(){
  const sc = Math.max(0, Math.floor(cameraX/TILE) - 1);
  const ec = Math.min(level.W, sc + Math.ceil(cw/TILE) + 3);

  for(let r=0; r<level.H; r++){
    for(let c=sc; c<ec; c++){
      const t = level.map[r][c];
      if(!t) continue;
      const x = c*TILE - cameraX;
      const y = r*TILE + HUD_H;
      const cols = TILE_COLORS[t] || ['#888','#aaa','#666'];
      ctx.fillStyle = cols[0];
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = cols[1];
      ctx.fillRect(x, y, TILE, 4);
      ctx.fillRect(x, y, 4, TILE);
      ctx.fillStyle = cols[2];
      ctx.fillRect(x, y+TILE-4, TILE, 4);
      ctx.fillRect(x+TILE-4, y, 4, TILE);
      const lbl = TILE_TEXT[t];
      if(lbl){
        ctx.font = `${Math.round(TILE*0.52)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(lbl, x+TILE/2, y+TILE/2);
      }
    }
  }
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(!e.alive) return;
    if(e.x+e.w < cameraX-50 || e.x > cameraX+cw+50) return;
    const ex = e.x - cameraX;
    const ey = e.y + HUD_H;  // ← Y offset
    ctx.save();
    if(e.dir<0){ ctx.scale(-1,1); ctx.translate(-ex*2 - e.w, 0); }
    if(e.type==='goomba'){
      // body
      ctx.fillStyle='#c8781a';
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2, ey+e.h*0.7, e.w/2, e.h*0.45, 0,0,Math.PI*2);
      ctx.fill();
      // head
      ctx.fillStyle='#d4924a';
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2, ey+e.h*0.35, e.w*0.42, e.h*0.38, 0,0,Math.PI*2);
      ctx.fill();
      // eyes
      ctx.fillStyle='white';
      ctx.fillRect(ex+10,ey+10,8,7);
      ctx.fillRect(ex+22,ey+10,8,7);
      ctx.fillStyle='#1a0a00';
      ctx.fillRect(ex+12,ey+12,4,4);
      ctx.fillRect(ex+24,ey+12,4,4);
    } else if(e.type==='koopa'){
      // shell
      ctx.fillStyle='#228b22';
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2, ey+e.h*0.6, e.w*0.44, e.h*0.42, 0,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle='#165016'; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(ex+e.w/2, ey+e.h*0.2);
      ctx.lineTo(ex+e.w/2, ey+e.h);
      ctx.stroke();
      // head
      ctx.fillStyle='#90ee90';
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2, ey+e.h*0.22, e.w*0.3, e.h*0.24, 0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#1a1a1a';
      ctx.fillRect(ex+e.w/2+4, ey+e.h*0.14, 5, 5);
    } else { // fly
      // wings
      ctx.fillStyle='rgba(180,230,255,0.7)';
      const flap = Math.sin(e.floatTimer*4)*12;
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2-14, ey+e.h/2+flap, 14, 8, -0.4,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2+14, ey+e.h/2-flap, 14, 8, 0.4,0,Math.PI*2);
      ctx.fill();
      // body
      ctx.fillStyle='#8855cc';
      ctx.beginPath();
      ctx.ellipse(ex+e.w/2, ey+e.h*0.55, e.w*0.35, e.h*0.35, 0,0,Math.PI*2);
      ctx.fill();
      // eyes
      ctx.fillStyle='white';
      ctx.fillRect(ex+10,ey+12,7,6);
      ctx.fillRect(ex+22,ey+12,7,6);
      ctx.fillStyle='black';
      ctx.fillRect(ex+12,ey+14,3,3);
      ctx.fillRect(ex+24,ey+14,3,3);
    }
    ctx.restore();
  });
}

function drawPlayer(){
  if(!player) return;
  const px = player.x - cameraX;
  const py = player.y + HUD_H;  // ← Y offset
  const blink = invincible>0 && Math.floor(invincible/4)%2===0;
  if(blink) return;

  ctx.save();
  if(player.facing < 0){ ctx.scale(-1,1); ctx.translate(-px*2 - player.w, 0); }

  // cap
  const capCol = starPower>0 ? '#ffdd00' : powerup>0 ? '#e03030' : '#cc2020';
  ctx.fillStyle = capCol;
  ctx.fillRect(px+4, py+2, player.w-8, 12);
  ctx.fillRect(px+2, py+6, player.w-4, 10);

  // face
  ctx.fillStyle = powerup>0 ? '#f0c88c' : '#f5d09a';
  ctx.fillRect(px+4, py+14, player.w-8, 14);

  // eyes
  ctx.fillStyle = '#3a1a00';
  ctx.fillRect(px+10, py+18, 5, 5);

  // body
  const bodyCol = starPower>0 ? '#ff9900' : powerup>0 ? '#2244cc' : '#2244cc';
  ctx.fillStyle = bodyCol;
  ctx.fillRect(px+4, py+28, player.w-8, 14);

  // legs
  ctx.fillStyle = '#884422';
  ctx.fillRect(px+4,  py+player.h-10, 12, 10);
  ctx.fillRect(px+player.w-16, py+player.h-10, 12, 10);

  // star glow
  if(starPower>0){
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.ellipse(px+player.w/2, py+player.h/2, player.w*0.7, player.h*0.6, 0,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(0, p.life/36);
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - cameraX - p.size/2, p.y + HUD_H - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function drawFloats(){
  floatTexts.forEach(t=>{
    ctx.globalAlpha = Math.min(1, t.life/20);
    ctx.fillStyle = t.col;
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.txt, t.x - cameraX, t.y + HUD_H);
  });
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawDeathEffect(){
  if(player && player.dead){
    const px = player.x - cameraX;
    const py = player.y + HUD_H;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('✕', px+player.w/2, py+player.h/2);
    ctx.textAlign = 'left';
  }
}

// ─── MAIN LOOP ─────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if(gameState !== 'play'){
    // still draw the scene in background for pause
    if(level){
      drawBg();
      drawTiles();
      drawEnemies();
      drawPlayer();
      drawParticles();
      drawFloats();
    }
    return;
  }

  mergeInput();
  updatePlayer();
  updateEnemies();
  updateEffects();
  updateTime();
  updateHUD();

  ctx.clearRect(0, 0, cw, ch);
  drawBg();
  drawTiles();
  drawEnemies();
  drawPlayer();
  drawDeathEffect();
  drawParticles();
  drawFloats();
  // donkere balk zodat HUD leesbaar blijft
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, cw, HUD_H);
}

requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(loop); });

})();
</script>
