<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Super Abel World - Werkend!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.85);
      border-bottom: 3px solid #ffcc33;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      z-index: 20;
      font-weight: bold;
      text-shadow: 1px 1px 0 black;
      color: white;
      backdrop-filter: blur(4px);
    }
    .hud-item {
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
      border-left: 3px solid #ffcc33;
    }
    .hud-label { font-size: 10px; color: #ffcc33; letter-spacing: 1px; }
    .hud-value { font-size: 18px; font-weight: bold; }
    
    #mobileControls {
      position: fixed;
      bottom: 15px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 30;
      pointer-events: none;
    }
    .ctrl-group {
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }
    .ctrl-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: 2px solid #ffcc33;
      color: #ffcc33;
      font-size: 32px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.05s linear;
      touch-action: manipulation;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .ctrl-btn:active { transform: scale(0.92); background: #ffaa33; color: black; }
    .ctrl-jump { background: rgba(200,60,40,0.8); border-color: #ff8866; }
    .ctrl-run { background: rgba(50,100,200,0.8); border-color: #88aaff; }
    @media (max-width: 600px) {
      .ctrl-btn { width: 55px; height: 55px; font-size: 26px; }
      .hud-value { font-size: 14px; }
    }
    
    .menu {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu.hidden { display: none; }
    .menu-card {
      background: linear-gradient(145deg, #1a1a3e, #0a0a1a);
      border: 3px solid #ffcc33;
      border-radius: 30px;
      padding: 25px;
      text-align: center;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .menu-logo { font-size: 28px; color: #ffcc33; text-shadow: 2px 2px 0 #b45f1b; margin-bottom: 10px; }
    .world-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
    .world-btn {
      background: #2c2c5e;
      border: 1px solid #888;
      color: white;
      font-family: monospace;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 25px;
      cursor: pointer;
    }
    .world-btn.active { background: #ffaa33; color: #1a1a2a; border-color: gold; }
    button {
      background: #e25822;
      border: none;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 25px;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 3px 0 #6b2e00;
    }
    button:active { transform: translateY(2px); box-shadow: 0 1px 0 #6b2e00; }
    .controls-info { font-size: 10px; color: #aaa; margin-top: 15px; padding-top: 10px; border-top: 1px solid #444; }
  </style>
</head>
<body>
<div id="hud">
  <div class="hud-item"><div class="hud-label">⭐ SCORE</div><div class="hud-value" id="scoreVal">0</div></div>
  <div class="hud-item"><div class="hud-label">🪙 MUNTEN</div><div class="hud-value" id="coinVal">0</div></div>
  <div class="hud-item"><div class="hud-label">🌍 WERELD</div><div class="hud-value" id="worldVal">1-1</div></div>
  <div class="hud-item"><div class="hud-label">⏱ TIJD</div><div class="hud-value" id="timeVal">400</div></div>
  <div class="hud-item"><div class="hud-label">❤️ LEVENS</div><div class="hud-value" id="livesVal">3</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="mobileControls">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="leftBtn">◀</div>
    <div class="ctrl-btn" id="rightBtn">▶</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn ctrl-run" id="runBtn">⚡</div>
    <div class="ctrl-btn ctrl-jump" id="jumpBtn">★</div>
  </div>
</div>

<!-- MENUS -->
<div id="startMenu" class="menu">
  <div class="menu-card">
    <div class="menu-logo">🍄 SUPER ABEL WORLD 🍄</div>
    <div style="font-size:12px; color:#ffcc88;">10 LEVELS • KEIHARDE VIJANDEN</div>
    <div class="world-grid" id="worldGrid">
      <button data-world="0" class="world-btn active">1-1 VLAKTE</button>
      <button data-world="1" class="world-btn">1-2 WOESTIJN</button>
      <button data-world="2" class="world-btn">2-1 NACHT</button>
      <button data-world="3" class="world-btn">2-2 IJS</button>
      <button data-world="4" class="world-btn">3-1 VULKAAN</button>
      <button data-world="5" class="world-btn">3-2 JUNGLE</button>
      <button data-world="6" class="world-btn">4-1 LUCHT</button>
      <button data-world="7" class="world-btn">4-2 MIJN</button>
      <button data-world="8" class="world-btn">5-1 KASTEEL</button>
      <button data-world="9" class="world-btn">⭐ FINALE</button>
    </div>
    <button id="startGameBtn">🚀 STARTEN</button>
    <div class="controls-info">◀ ▶ lopen | Z / SPATIE / ↑ springen | X / SHIFT rennen | Touch knoppen onderin</div>
  </div>
</div>
<div id="pauseMenu" class="menu hidden"><div class="menu-card"><div class="menu-logo">⏸ PAUZE</div><button id="resumeBtn">VERDER</button><button id="quitToMenuBtn">MENU</button></div></div>
<div id="gameoverMenu" class="menu hidden"><div class="menu-card"><div class="menu-logo">💀 GAME OVER</div><div id="goScore" style="margin:10px;"></div><button id="retryBtn">OPNIEUW</button><button id="goMenuBtn">MENU</button></div></div>
<div id="winMenu" class="menu hidden"><div class="menu-card"><div class="menu-logo">🏆 LEVEL GEWONNEN!</div><div id="winInfo" style="margin:10px;"></div><button id="nextLevelBtn">VOLGENDE LEVEL ▶</button><button id="winMenuBtn">MENU</button></div></div>

<script>
  (function(){
    // CANVAS
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let cw, ch;
    function resize() { cw = window.innerWidth; ch = window.innerHeight; canvas.width = cw; canvas.height = ch; }
    window.addEventListener('resize', resize); resize();

    // GAME CONST
    const TILE = 48;
    const GRAVITY = 0.62;
    const MAX_FALL = 14;
    const WALK_SPEED = 3.4;
    const RUN_SPEED = 5.8;
    const JUMP_POWER = -12.2;
    const RUN_JUMP_POWER = -14.0;
    const COYOTE_TIME = 6;
    const JUMP_BUFFER_FRAMES = 6;

    let gameState = 'menu'; // menu, play, pause, gameover, win
    let currentLevel = 0;
    let level = null;
    let player = null;
    let camera = { x: 0 };
    let score = 0;
    let coins = 0;
    let lives = 3;
    let timeLeft = 400;
    let timeFrame = 0;
    let enemies = [];
    let particles = [];
    let floatTexts = [];
    let invincible = 0;
    let powerMode = 0; // 0=small, 1=big
    
    // INPUT
    let input = { left: false, right: false, jump: false, run: false };
    let prevJump = false;
    let jumpBuffer = 0;
    let coyote = 0;
    
    // ========== LEVEL DEFINITIES (10 levels met layout) ==========
    const levelThemes = [
      { name:"1-1 Groene Vlakte", sky:"#5c9ce0", ground:"#3a7c5a", time:420, w:210, h:20, lava:false },
      { name:"1-2 Zand Duinen", sky:"#e8b55a", ground:"#c28a3e", time:440, w:220, h:20, lava:false },
      { name:"2-1 Nachtkasteel", sky:"#12102a", ground:"#2a1e4a", time:460, w:230, h:20, lava:false },
      { name:"2-2 IJsland", sky:"#8ecae6", ground:"#4699c4", time:450, w:240, h:20, lava:false },
      { name:"3-1 Vulkaan", sky:"#702020", ground:"#3e0a0a", time:480, w:250, h:20, lava:true },
      { name:"3-2 Jungle", sky:"#2f6b2f", ground:"#1e451e", time:470, w:260, h:20, lava:false },
      { name:"4-1 Luchtpaleis", sky:"#7ccfff", ground:"#3c9eff", time:500, w:270, h:20, lava:false },
      { name:"4-2 Mijnschacht", sky:"#5a4a3a", ground:"#3a2a1e", time:520, w:280, h:20, lava:false },
      { name:"5-1 Duister Kasteel", sky:"#3a2a4e", ground:"#1a0a2e", time:550, w:290, h:20, lava:false },
      { name:"⭐ Finale Bowser", sky:"#a13020", ground:"#4a1008", time:600, w:310, h:22, lava:true }
    ];
    
    function buildLevel(themeIdx) {
      const th = levelThemes[themeIdx];
      const W = th.w, H = th.h;
      const map = Array(H).fill().map(() => Array(W).fill(0));
      // Basis vloer
      for(let x=0; x<W; x++) {
        if(H-2 >= 0) map[H-2][x] = 1;
        map[H-1][x] = 1;
      }
      // Platforms
      for(let i=0; i<W/2; i++) {
        let x = (i * 11 + themeIdx * 19) % (W-3);
        let y = H-4 - (i % 4);
        if(y > 2 && x < W-2 && map[y][x] === 0) {
          map[y][x] = 1;
          if(i%3 === 0 && y-1 > 0) map[y-1][x] = 4; // ? blok
        }
      }
      // Zwevende munten
      for(let i=0; i<W; i+=2) {
        let x = (i * 7) % (W-2);
        let y = H-6 - (i % 6);
        if(y > 1 && map[y][x] === 0) map[y][x] = 8;
      }
      // Finish vlag rechts
      for(let r=H-5; r<H-1; r++) map[r][W-3] = 9;
      // Lava
      if(th.lava) {
        for(let i=0; i<W; i+=2) map[H-1][i] = 10;
      }
      
      // Vijanden - VEEL!
      const enemyTypes = ['goomba', 'koopa', 'fly'];
      let enemyList = [];
      // Grond vijanden
      for(let i=2; i<W-3; i+=2) {
        let x = i * TILE + 20 + (themeIdx * 30);
        let y = (H-2) * TILE - 46;
        let type = enemyTypes[(i + themeIdx) % 3];
        enemyList.push({ x, y, type, dir: (i%2===0)?-1:1, alive: true, vy: 0, onGround: false, timer: 0, w: 38, h: 42 });
      }
      // Vliegende vijanden
      for(let i=0; i<40; i++) {
        let x = (i * 70 + 100) % ((W-3)*TILE);
        let y = (H-6)*TILE - (i%5)*20;
        enemyList.push({ x, y, type: 'fly', dir: 1, alive: true, vy: 0, onGround: false, timer: i*10, w: 38, h: 38 });
      }
      // Koopas op platforms
      for(let i=0; i<25; i++) {
        let x = (i * 95 + 150) % ((W-3)*TILE);
        let y = (H-4)*TILE - 45;
        enemyList.push({ x, y, type: 'koopa', dir: (i%2===0)?1:-1, alive: true, vy: 0, onGround: true, timer: 0, w: 40, h: 44 });
      }
      
      return { map, W, H, enemies: enemyList, theme: th };
    }
    
    function loadLevel(idx) {
      const built = buildLevel(idx);
      level = {
        map: built.map,
        W: built.W,
        H: built.H,
        enemies: built.enemies.map(e => ({...e, alive: true})),
        name: built.theme.name,
        sky: built.theme.sky,
        ground: built.theme.ground,
        timeLimit: built.theme.time
      };
      timeLeft = level.timeLimit;
      timeFrame = 0;
      enemies = level.enemies;
      invincible = 0;
      powerMode = 0;
      player = {
        x: 3 * TILE, y: (level.H-3) * TILE - 48,
        vx: 0, vy: 0, w: 36, h: 42,
        onGround: true, facing: 1,
        dead: false, deadTimer: 0
      };
      camera.x = 0;
      particles = [];
      floatTexts = [];
    }
    
    function startGame(levelIdx) {
      currentLevel = levelIdx;
      score = 0;
      coins = 0;
      lives = 3;
      loadLevel(currentLevel);
      gameState = 'play';
      document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
      updateUI();
    }
    
    function updateUI() {
      document.getElementById('scoreVal').innerText = String(score).slice(0,8);
      document.getElementById('coinVal').innerText = coins;
      document.getElementById('worldVal').innerText = level ? level.name.split(' ')[0] : "1-1";
      document.getElementById('timeVal').innerText = Math.max(0, Math.ceil(timeLeft));
      document.getElementById('livesVal').innerText = lives;
    }
    
    function getTile(col, row) {
      if(!level) return 0;
      if(row<0 || row>=level.H || col<0 || col>=level.W) return 0;
      return level.map[row][col];
    }
    
    function isSolid(t) { return t === 1 || t === 2 || t === 3 || t === 5; }
    function isLethal(t) { return t === 10; }
    function isCoinTile(t) { return t === 8; }
    function isBlock(t) { return t === 4; }
    
    function moveEntity(ent, dx, dy, isPlayer) {
      // X collision
      ent.x += dx;
      let left = Math.floor(ent.x/TILE), right = Math.floor((ent.x+ent.w-1)/TILE);
      let top = Math.floor(ent.y/TILE), bottom = Math.floor((ent.y+ent.h-1)/TILE);
      for(let c=left; c<=right; c++) {
        for(let r=top; r<=bottom; r++) {
          if(isSolid(getTile(c,r))) {
            if(dx > 0) ent.x = c*TILE - ent.w;
            if(dx < 0) ent.x = (c+1)*TILE;
            if(isPlayer) ent.vx = 0;
          }
        }
      }
      // Y collision
      ent.onGround = false;
      ent.y += dy;
      left = Math.floor(ent.x/TILE); right = Math.floor((ent.x+ent.w-1)/TILE);
      top = Math.floor(ent.y/TILE); bottom = Math.floor((ent.y+ent.h-1)/TILE);
      for(let c=left; c<=right; c++) {
        for(let r=top; r<=bottom; r++) {
          let tile = getTile(c,r);
          if(isSolid(tile)) {
            if(dy > 0) {
              ent.y = r*TILE - ent.h;
              ent.vy = 0;
              ent.onGround = true;
            }
            if(dy < 0 && isPlayer && isBlock(tile)) {
              level.map[r][c] = 0;
              coins++;
              score += 100;
              addFloatText(c*TILE+TILE/2, r*TILE, "+100", "#ffcc44");
              addParticles(c*TILE+TILE/2, r*TILE, 6, "#ffaa33");
            }
          }
        }
      }
    }
    
    function updatePlayer() {
      if(player.dead) {
        player.deadTimer++;
        player.vy += GRAVITY;
        player.y += player.vy;
        if(player.deadTimer > 60) {
          lives--;
          if(lives <= 0) {
            gameState = 'gameover';
            document.getElementById('goScore').innerHTML = `Score: ${score}<br>Munten: ${coins}`;
            document.getElementById('gameoverMenu').classList.remove('hidden');
            return;
          } else {
            loadLevel(currentLevel);
          }
        }
        return;
      }
      
      if(invincible > 0) invincible--;
      
      let speed = input.run ? RUN_SPEED : WALK_SPEED;
      if(input.left) { player.vx = Math.max(player.vx - 0.55, -speed); player.facing = -1; }
      else if(input.right) { player.vx = Math.min(player.vx + 0.55, speed); player.facing = 1; }
      else { player.vx *= 0.92; }
      
      if(player.onGround) coyote = COYOTE_TIME;
      else if(coyote > 0) coyote--;
      
      if(input.jump && !prevJump) jumpBuffer = JUMP_BUFFER_FRAMES;
      if(jumpBuffer > 0 && coyote > 0) {
        player.vy = input.run ? RUN_JUMP_POWER : JUMP_POWER;
        coyote = 0;
        jumpBuffer = 0;
      }
      if(jumpBuffer > 0) jumpBuffer--;
      if(!input.jump && player.vy < -4) player.vy += 1.2;
      
      player.vy += GRAVITY;
      if(player.vy > MAX_FALL) player.vy = MAX_FALL;
      moveEntity(player, player.vx, player.vy, true);
      
      // Coins verzamelen
      let mx = Math.floor((player.x+player.w/2)/TILE);
      let my = Math.floor((player.y+player.h/2)/TILE);
      if(isCoinTile(getTile(mx, my))) {
        level.map[my][mx] = 0;
        coins++;
        score += 50;
        addFloatText(mx*TILE, my*TILE, "🪙", "#ffd966");
        addParticles(mx*TILE+TILE/2, my*TILE+TILE/2, 4, "#ffcc44");
      }
      
      // Lethal tiles
      if(isLethal(getTile(mx, my))) killPlayer();
      
      // Finish vlag (tile 9)
      if(getTile(mx, my) === 9 || getTile(mx+1, my) === 9) winLevel();
      
      // Uit level vallen
      if(player.y > level.H * TILE + 100) killPlayer();
      
      // Camera volgen
      camera.x = player.x + player.w/2 - cw/2;
      camera.x = Math.max(0, Math.min(camera.x, level.W * TILE - cw));
    }
    
    function killPlayer() {
      if(player.dead) return;
      if(powerMode > 0 && invincible <= 0) {
        powerMode = 0;
        invincible = 50;
        addFloatText(player.x, player.y-20, "AU!", "#ff8888");
        return;
      }
      player.dead = true;
      player.vy = -11;
      player.vx = 0;
      addParticles(player.x+player.w/2, player.y+player.h/2, 20, "#ff4400");
    }
    
    function winLevel() {
      let bonus = Math.floor(timeLeft) * 10;
      score += bonus;
      if(currentLevel + 1 < levelThemes.length) {
        gameState = 'win';
        document.getElementById('winInfo').innerHTML = `Score: ${score}<br>Munten: ${coins}<br>BONUS: +${bonus}`;
        document.getElementById('winMenu').classList.remove('hidden');
      } else {
        gameState = 'win';
        document.getElementById('winInfo').innerHTML = `🏆 JE HEBT HET SPEL UITGESPEELD! 🏆<br>Score: ${score}`;
        document.getElementById('nextLevelBtn').innerHTML = "SPEL UITGESPEELD ▶";
        document.getElementById('winMenu').classList.remove('hidden');
      }
    }
    
    function updateEnemies() {
      for(let i=0; i<enemies.length; i++) {
        let e = enemies[i];
        if(!e.alive) continue;
        let spd = (e.type === 'fly' ? 1.5 : e.type === 'koopa' ? 1.2 : 1.0);
        if(e.type === 'fly') {
          e.x += e.dir * spd;
          e.timer = (e.timer || 0) + 0.1;
          e.y += Math.sin(e.timer) * 1.3;
          if(e.x < camera.x - 200) e.dir = 1;
          if(e.x > camera.x + cw + 200) e.dir = -1;
        } else {
          e.vy += GRAVITY;
          e.x += e.dir * spd;
          moveEntity(e, e.dir * spd, e.vy, false);
          if(!e.onGround && e.vy > 2) {
            let leftTile = Math.floor(e.x/TILE);
            let below = Math.floor((e.y+e.h)/TILE);
            if(!isSolid(getTile(leftTile, below)) && !isSolid(getTile(leftTile+1, below))) e.dir *= -1;
          }
        }
        // Player vs enemy collision
        if(!player.dead && invincible <= 0) {
          if(player.x+player.w-10 > e.x && player.x+10 < e.x+38 &&
             player.y+player.h-12 > e.y && player.y+12 < e.y+42) {
            if(player.vy > 0 && player.y+player.h-16 < e.y+22) {
              e.alive = false;
              score += (e.type === 'koopa' ? 300 : 150);
              player.vy = -8;
              addFloatText(e.x, e.y, e.type==='koopa'?"+300":"+150", "#ffff88");
              addParticles(e.x+20, e.y+20, 8, "#dd8844");
            } else {
              killPlayer();
            }
          }
        }
        if(e.y > level.H * TILE + 200) e.alive = false;
      }
    }
    
    function addFloatText(x,y,text,col) { floatTexts.push({ x, y, text, col, life: 45, vy: -1.2 }); }
    function addParticles(x,y,c,col) { for(let i=0;i<c;i++) particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-1)*3, life: 25+Math.random()*20, color: col, size: 3+Math.random()*4 }); }
    function updateEffects() {
      particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life>0; });
      floatTexts = floatTexts.filter(t => { t.y += t.vy; t.life--; return t.life>0; });
    }
    
    function updateTime() {
      if(gameState !== 'play') return;
      timeFrame++;
      if(timeFra
